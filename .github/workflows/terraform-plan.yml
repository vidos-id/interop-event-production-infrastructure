name: terraform-plan

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: terraform-plan-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  plan:
    name: plan (production)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout terraform code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          path: infra

      - name: Checkout tf-state branch (optional)
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: tf-state
          fetch-depth: 1
          path: tf-state

      - name: Ensure state path exists
        run: mkdir -p tf-state/state/production

      - name: Configure Terraform for published provider
        run: |
          cat > "$RUNNER_TEMP/terraformrc-production" <<EOF2
          provider_installation {
            direct {}
          }
          EOF2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform fmt
        working-directory: infra
        run: terraform fmt -check

      - name: Terraform init (production)
        working-directory: infra
        env:
          TF_CLI_CONFIG_FILE: ${{ runner.temp }}/terraformrc-production
          TF_VAR_vidos_api_key: ${{ secrets.VIDOS_API_KEY }}
          TF_VAR_vidos_region: ${{ secrets.VIDOS_REGION }}
        run: terraform init

      - name: Terraform validate
        working-directory: infra
        run: terraform validate

      - name: Terraform plan (production state)
        working-directory: infra
        env:
          TF_CLI_CONFIG_FILE: ${{ runner.temp }}/terraformrc-production
          TF_VAR_vidos_api_key: ${{ secrets.VIDOS_API_KEY }}
          TF_VAR_vidos_region: ${{ secrets.VIDOS_REGION }}
        run: terraform plan -no-color -state=../tf-state/state/production/terraform.tfstate
